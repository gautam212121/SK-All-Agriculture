<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - SK Agriculture Parts</title>
    <meta name="description"
        content="The agricultural spare parts page or catalog item you are looking for does not exist. Return to shop listings.">
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

    <!-- Shared Header placeholder -->
    <div id="header-placeholder"></div>

    <!-- 404 Hero Section -->
    <section class="section-padding"
        style="min-height: 75vh; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div class="container" style="max-width: 550px;">

            <div
                style="background: var(--bg-surface); border: 1px dashed var(--border-light); border-radius: var(--radius-lg); padding: 60px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">

                <div style="font-size: 80px; margin-bottom: 20px; animation: bounce 2s infinite;">🔍</div>

                <h1
                    style="font-family: 'Outfit', sans-serif; font-size: 56px; color: var(--accent-gold); line-height: 1; margin-bottom: 12px; font-weight: 800;">
                    404</h1>
                <h2
                    style="font-family: 'Outfit', sans-serif; font-size: 22px; color: var(--text-light); margin-bottom: 16px;">
                    Component Not Found</h2>

                <p
                    style="color: var(--text-muted); font-size: 14px; line-height: 1.6; max-width: 420px; margin: 0 auto 30px auto;">
                    We couldn't find the page or agricultural spare part you requested. The item may have been
                    de-cataloged, or the link might be broken.
                </p>

                <div style="display: flex; gap: 12px; justify-content: center;">
                    <a href="/shop.html" class="btn-accent" style="font-size: 14px; padding: 12px 24px;">
                        Browse Parts Catalog
                    </a>
                    <a href="/index.html" class="btn-login"
                        style="font-size: 14px; padding: 12px 24px; text-decoration: none;">
                        Return Home
                    </a>
                </div>

            </div>

        </div>
    </section>

    <!-- Shared Footer placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Storefront Client Interactivity Script -->
    <script src="/js/main.js"></script>
</body>

</html>
