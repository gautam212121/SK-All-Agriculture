<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Banners - SK All Agriculture Parts Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div id="admin-wrapper" data-active-page="banners" data-title="Homepage Banners" data-desc="Configure sliding banners, promotional images, and custom links on the store homepage.">
        
        <!-- Sidebar Navigation Placeholder -->
        <div id="admin-sidebar-placeholder"></div>

        <!-- Main Workspace Panel -->
        <div class="admin-main">
            
            <!-- Top Header Bar Placeholder -->
            <div id="admin-header-placeholder"></div>

            <!-- Content Panel -->
            <div class="admin-content" style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; align-items: start;">
                
                <!-- Col 1: Banners Table -->
                <div class="admin-card">
                    <div style="border-bottom: 1px solid var(--admin-border); padding-bottom: 14px; margin-bottom: 20px;">
                        <h3 style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-light);">Active Carousel Banners</h3>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th style="width: 100px;">Banner Preview</th>
                                    <th>Title / Subtitle</th>
                                    <th>Redirection Link</th>
                                    <th style="text-align: center; width: 80px;">Order</th>
                                    <th style="text-align: center; width: 80px;">Status</th>
                                    <th style="text-align: right; width: 100px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-banners-table-body">
                                <tr>
                                    <td colspan="6" style="text-align: center; color: var(--text-gray); padding: 30px 0;">
                                        Loading homepage banners...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Col 2: Add Banner Form -->
                <div class="admin-card">
                    <div style="border-bottom: 1px solid var(--admin-border); padding-bottom: 14px; margin-bottom: 20px;">
                        <h3 id="form-title" style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-light);">Add New Banner</h3>
                    </div>

                    <form id="admin-add-banner-form" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 16px;">
                        
                        <div class="form-group">
                            <label for="banner_title">Banner Heading / Title *</label>
                            <input type="text" id="banner_title" name="title" required class="form-control" placeholder="High-Tensile Rotavator Parts">
                        </div>

                        <div class="form-group">
                            <label for="banner_subtitle">Subheading / Description</label>
                            <textarea id="banner_subtitle" name="subtitle" rows="2" class="form-control" placeholder="Engineered for heavy-duty field operations. Premium forged yokes & shafts."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="banner_link">Action Redirection Link (URL)</label>
                            <input type="text" id="banner_link" name="link_url" class="form-control" placeholder="/shop.html?category=rotavator-yoke">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="form-group">
                                <label for="banner_order">Display Order Sequence *</label>
                                <input type="number" id="banner_order" name="display_order" required min="0" value="0" class="form-control">
                            </div>
                            <div class="form-group" style="display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 4px;">
                                <div style="display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.01); border: 1px solid var(--admin-border); border-radius: var(--radius-sm); padding: 10px; height: 42px;">
                                    <input type="checkbox" id="banner_is_active" name="is_active" checked style="width: 16px; height: 16px; cursor: pointer;">
                                    <label for="banner_is_active" style="margin-bottom: 0; cursor: pointer; font-size: 13px; color: var(--text-light);">Active & Published</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="banner_image_input">Banner Graphic Image *</label>
                            <input type="file" id="banner_image_input" name="image" required accept="image/*" class="form-control" style="padding: 8px;">
                            <div id="banner_image_preview" style="margin-top: 10px;"></div>
                        </div>

                        <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                            <input type="hidden" id="edit_banner_id" name="edit_banner_id">
                            <button type="submit" id="banner-submit-btn" class="admin-btn" style="width: 100%; padding: 12px 0; font-size: 14px; font-weight: 700; background-color: var(--accent); color: var(--bg-admin-dark); text-align: center; justify-content: center;">
                                💾 Upload Banner
                            </button>
                            <button type="button" id="banner-cancel-btn" class="admin-btn admin-btn-secondary" style="display: none; width: 100%; padding: 12px 0; font-size: 14px; font-weight: 700; text-align: center; justify-content: center;">
                                ❌ Cancel Edit
                            </button>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>

    <!-- Administrative Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
