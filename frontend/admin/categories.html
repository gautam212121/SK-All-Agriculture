<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - SK All Agriculture Parts Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div id="admin-wrapper" data-active-page="categories" data-title="Product Divisions" data-desc="Define machinery divisions (Rotavator, Tractor, PTO Shaft, Hardware) to categorize shop items.">
        
        <!-- Sidebar Navigation Placeholder -->
        <div id="admin-sidebar-placeholder"></div>

        <!-- Main Workspace Panel -->
        <div class="admin-main">
            
            <!-- Top Header Bar Placeholder -->
            <div id="admin-header-placeholder"></div>

            <!-- Content Panel -->
            <div class="admin-content" style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; align-items: start;">
                
                <!-- Col 1: Categories Table -->
                <div class="admin-card">
                    <div style="border-bottom: 1px solid var(--admin-border); padding-bottom: 14px; margin-bottom: 20px;">
                        <h3 style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-light);">Active Categories</h3>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th style="width: 60px;">Icon</th>
                                    <th>Category Name</th>
                                    <th>Slug</th>
                                    <th>Description</th>
                                    <th style="text-align: center;">Catalog Size</th>
                                    <th style="text-align: right; width: 160px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-categories-table-body">
                                <tr>
                                    <td colspan="6" style="text-align: center; color: var(--text-gray); padding: 30px 0;">
                                        Loading machine divisions...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Col 2: Add/Edit Category Form -->
                <div class="admin-card">
                    <div style="border-bottom: 1px solid var(--admin-border); padding-bottom: 14px; margin-bottom: 20px;">
                        <h3 id="form-title" style="font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-light);">Add New Division</h3>
                    </div>

                    <form id="admin-add-category-form" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 16px;">
                        
                        <div class="form-group">
                            <label for="cat_name">Category Name *</label>
                            <input type="text" id="cat_name" name="name" required class="form-control" placeholder="PTO Cross Kit">
                        </div>

                        <div class="form-group">
                            <label for="cat_desc">Summary Description</label>
                            <textarea id="cat_desc" name="description" rows="3" class="form-control" placeholder="Heavy duty replacement cross kits and joints for standard power take-off couplers."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="cat_image_input">Division Icon / Image *</label>
                            <input type="file" id="cat_image_input" name="image" required accept="image/*" class="form-control" style="padding: 8px;">
                            <div id="cat_image_preview" style="margin-top: 10px;"></div>
                        </div>

                        <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 10px;">
                            <input type="hidden" id="edit_category_id" name="edit_category_id">
                            <button type="submit" id="cat-submit-btn" class="admin-btn" style="width: 100%; padding: 12px 0; font-size: 14px; font-weight: 700; background-color: var(--accent); color: var(--bg-admin-dark); text-align: center; justify-content: center;">
                                Save Category Division
                            </button>
                            <button type="button" id="cat-cancel-btn" class="admin-btn admin-btn-secondary" style="display: none; width: 100%; padding: 12px 0; font-size: 14px; font-weight: 700; text-align: center; justify-content: center;">
                                ❌ Cancel Edit
                            </button>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>

    <!-- Administrative Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
