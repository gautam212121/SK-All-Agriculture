<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Stock Inventory - SK All Agriculture Parts Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div id="admin-wrapper" data-active-page="inventory" data-title="Quick Stock Board" data-desc="Instantly adjust inventory stock levels, unit pricing, or discount prices without leaving the grid view.">
        
        <!-- Sidebar Navigation Placeholder -->
        <div id="admin-sidebar-placeholder"></div>

        <!-- Main Workspace Panel -->
        <div class="admin-main">
            
            <!-- Top Header Bar Placeholder -->
            <div id="admin-header-placeholder"></div>

            <!-- Content Panel -->
            <div class="admin-content">
                
                <!-- Inventory Board Grid Card -->
                <div class="admin-card">
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th style="width: 40%;">Part Description</th>
                                    <th>Category</th>
                                    <th>SKU Identifier</th>
                                    <th>Price</th>
                                    <th>Stock Level</th>
                                    <th style="text-align: center; width: 220px;">Quick Stock Edit</th>
                                </tr>
                            </thead>
                            <tbody id="admin-inventory-tbody">
                                <tr>
                                    <td colspan="6" style="text-align: center; color: var(--text-gray); padding: 40px 0;">
                                        Loading inventory catalog board...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Administrative Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
