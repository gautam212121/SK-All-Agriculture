<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - SK All Agriculture Parts Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div id="admin-wrapper" data-active-page="orders" data-title="Customer Orders" data-desc="Review transaction history, track farm GPS coordinates, and manage shipping statuses.">
        
        <!-- Sidebar Navigation Placeholder -->
        <div id="admin-sidebar-placeholder"></div>

        <!-- Main Workspace Panel -->
        <div class="admin-main">
            
            <!-- Top Header Bar Placeholder -->
            <div id="admin-header-placeholder"></div>

            <!-- Content Panel -->
            <div class="admin-content">
                
                <!-- Orders Table Card -->
                <div class="admin-card">
                    <div style="overflow-x: auto;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer Name</th>
                                    <th>Date & Time</th>
                                    <th>Shipping Address</th>
                                    <th>Grand Total</th>
                                    <th>Delivery Status</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-orders-table-body">
                                <tr>
                                    <td colspan="7" style="text-align: center; color: var(--text-gray); padding: 40px 0;">
                                        Fetching customer transaction records...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Administrative Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
