<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings - SK All Agriculture Parts Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

    <div id="admin-wrapper" data-active-page="settings" data-title="Administrative Settings" data-desc="Configure store administrator profile details, passwords, and security emails.">
        
        <!-- Sidebar Navigation Placeholder -->
        <div id="admin-sidebar-placeholder"></div>

        <!-- Main Workspace Panel -->
        <div class="admin-main">
            
            <!-- Top Header Bar Placeholder -->
            <div id="admin-header-placeholder"></div>

            <!-- Content Panel -->
            <div class="admin-content" style="max-width: 650px;">
                
                <!-- Profile Settings Card -->
                <div class="admin-card">
                    
                    <form id="admin-profile-settings-form" style="display: flex; flex-direction: column; gap: 20px;">
                        
                        <h3 style="font-family: 'Outfit', sans-serif; font-size: 16px; color: var(--text-light); border-bottom: 1px solid var(--admin-border); padding-bottom: 8px; margin-bottom: 4px; font-weight: 600;">Account Credentials</h3>

                        <div class="form-group">
                            <label for="username">Administrative Username (Read-Only)</label>
                            <input type="text" id="username" readonly class="form-control" style="background: rgba(0,0,0,0.25); cursor: not-allowed;" placeholder="admin">
                        </div>

                        <div class="form-group">
                            <label for="name">Display Name *</label>
                            <input type="text" id="name" required class="form-control" placeholder="Store Manager">
                        </div>

                        <div class="form-group">
                            <label for="email">Administrator Email *</label>
                            <input type="email" id="email" required class="form-control" placeholder="admin@agripartsshop.com">
                        </div>

                        <div class="form-group">
                            <label for="password">Change Security Password (Leave blank to keep current)</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••">
                        </div>

                        <div style="margin-top: 10px;">
                            <button type="submit" class="admin-btn" style="width: 100%; padding: 12px 0; font-size: 14px; font-weight: 700; background-color: var(--accent); color: var(--bg-admin-dark);">
                                💾 Save Profile Settings
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Administrative Scripts -->
    <script src="/js/admin.js"></script>
</body>
</html>
