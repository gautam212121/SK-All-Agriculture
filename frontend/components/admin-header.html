<!-- Administrative Workspace Top Header Component -->
<div style="display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 12px;">
    
    <!-- Mobile Hamburger Toggle Button -->
    <button class="admin-menu-toggle" id="admin-menu-toggle" aria-label="Toggle Admin Menu" style="display: none; align-items: center; justify-content: center; font-size: 24px; background: rgba(255,255,255,0.03); border: 1px solid var(--admin-border); color: var(--text-white); padding: 8px 12px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition);">
        ☰
    </button>

    <div style="flex-grow: 1; min-width: 0;">
        <h1 id="admin-page-title" style="margin: 0; font-family: 'Outfit', sans-serif; font-size: 26px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Admin Console</h1>
        <p id="admin-page-desc" class="admin-title-desc" style="color: var(--text-gray); font-size: 13px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Fulfillment panel and settings manager.</p>
    </div>
    
    <!-- Theme Toggle Button -->
    <button id="admin-theme-toggle-btn" aria-label="Toggle Dark/Light Mode" style="background: rgba(255,255,255,0.03); border: 1px solid var(--admin-border); font-size: 18px; cursor: pointer; padding: 8px 12px; display: flex; align-items: center; justify-content: center; color: var(--text-white); border-radius: var(--radius-md); transition: var(--transition); flex-shrink: 0;">
        ☀️
    </button>

    <div style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 6px 12px; border: 1px solid var(--admin-border); border-radius: var(--radius-md); flex-shrink: 0;">
        <span style="font-size: 18px;">🛡️</span>
        <div style="text-align: right;" class="admin-header-profile-text">
            <div id="admin-profile-name" style="font-size: 12px; font-weight: 600; line-height: 1.2;">Admin</div>
            <div style="font-size: 10px; color: var(--text-gray);">Administrator</div>
        </div>
    </div>
</div>
