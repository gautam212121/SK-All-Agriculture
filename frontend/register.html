<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration - SK All Agriculture Parts</title>
    <meta name="description" content="Register a new account on SK All Agriculture Parts to place orders, save addresses, and coordinate direct WhatsApp delivery.">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

    <!-- Shared Header placeholder -->
    <div id="header-placeholder"></div>

    <!-- Registration Authentication Section -->
    <section class="section-padding" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(20,20,20,0.8) 0%, rgba(10,10,10,0.95) 100%);">
        <div class="container" style="max-width: 520px;">
            
            <div class="checkout-form-card" style="padding: 40px; border: 1px solid var(--border-light); background: var(--bg-surface); box-shadow: 0 15px 35px rgba(0,0,0,0.4);">
                
                <!-- Title Header -->
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 40px; margin-bottom: 12px;">🌾</div>
                    <h1 style="font-family: 'Outfit', sans-serif; font-size: 24px; color: var(--text-light); margin-bottom: 8px;">Create Customer Account</h1>
                    <p style="color: var(--text-muted); font-size: 13px; line-height: 1.4;">Sign up to easily place spare parts orders with farm GPS location tracking.</p>
                </div>

                <!-- Registration Form -->
                <form id="register-form" style="display: flex; flex-direction: column; gap: 16px;">
                    
                    <!-- Full Name -->
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required class="form-control" placeholder="Ajeet Gautam">
                    </div>

                    <!-- Email Address -->
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required class="form-control" placeholder="ajeet@gmail.com">
                    </div>

                    <!-- Phone Number -->
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="phone">Mobile Number (WhatsApp Enabled)</label>
                        <div style="display: flex; align-items: center; position: relative;">
                            <span style="position: absolute; left: 14px; color: var(--text-muted); font-size: 14px; font-family: monospace; font-weight: 600;">+91</span>
                            <input type="tel" id="phone" required pattern="[0-9]{10}" class="form-control" style="padding-left: 50px;" placeholder="9026754812">
                        </div>
                        <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Required to send checkout invoices and coordinate delivery.</span>
                    </div>

                    <!-- Password -->
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="password">Create Security Password</label>
                        <input type="password" id="password" required minlength="6" class="form-control" placeholder="••••••••">
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 6px;">
                        <label for="confirmPassword">Re-type Security Password</label>
                        <input type="password" id="confirmPassword" required minlength="6" class="form-control" placeholder="••••••••">
                    </div>

                    <!-- Submit Button -->
                    <div style="margin-top: 10px;">
                        <button type="submit" class="btn-accent" style="width: 100%; padding: 14px 0; font-size: 15px; font-weight: 600;">
                            Register Account ➔
                        </button>
                    </div>

                </form>

                <!-- Navigation Links -->
                <div style="text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border-light); padding-top: 20px;">
                    Already have an account? 
                    <a href="/login.html" style="color: var(--accent-gold); font-weight: 600; text-decoration: none; margin-left: 4px;">Sign in here</a>
                </div>

            </div>

            <!-- Return to Homepage -->
            <div style="text-align: center; margin-top: 20px;">
                <a href="/index.html" style="font-size: 13px; color: var(--text-muted);">← Back to Storefront Home</a>
            </div>

        </div>
    </section>

    <!-- Shared Footer placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Storefront Client Interactivity Script -->
    <script src="/js/main.js"></script>
</body>
</html>
