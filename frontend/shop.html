<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spare Parts Catalog | SK All Agriculture Parts</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container" style="padding: 40px 24px 80px 24px;">
        <!-- Breadcrumbs -->
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px;">
            <a href="/index.html" style="color: var(--text-light);">Home</a> &nbsp;/&nbsp; 
            <span style="color: var(--accent-gold); font-weight: 600;">Spare Parts Catalog</span>
        </div>

        <!-- 2 Column Layout (Filters Sidebar + Products Listings) -->
        <div class="shop-layout">
            
            <!-- SIDEBAR FILTERS (Injected via main.js) -->
            <aside class="shop-sidebar">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 16px; margin-bottom: 24px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <button id="close-filter-drawer" class="mobile-only-close" style="display: none; background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 0; margin-right: 4px; line-height: 1;">×</button>
                        <h3 style="font-family: 'Outfit', sans-serif; font-size: 18px; margin: 0;">Filters</h3>
                    </div>
                    <a href="/shop.html" style="font-size: 12px; color: var(--accent-gold); font-weight: 600;">Clear All</a>
                </div>

                <!-- Category Filters placeholder -->
                <div style="margin-bottom: 30px;">
                    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Categories</h4>
                    <ul style="list-style: none; display: flex; flex-direction: column; gap: 10px;" id="shop-categories-filter">
                        <li style="color: var(--text-muted); font-size: 13px;">Loading categories...</li>
                    </ul>
                </div>

                <!-- Brand Filters placeholder -->
                <div style="margin-bottom: 30px; border-top: 1px solid var(--border-light); padding-top: 24px;">
                    <h4 style="font-size: 14px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Brands</h4>
                    <ul style="list-style: none; display: flex; flex-direction: column; gap: 10px;" id="shop-brands-filter">
                        <li style="color: var(--text-muted); font-size: 13px;">Loading brands...</li>
                    </ul>
                </div>
            </aside>

            <!-- PRODUCT LISTINGS COLUMN -->
            <div>
                <!-- Top sorting panel -->
                <div style="background-color: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 16px;">
                    <div id="shop-counts-text" style="font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 12px;">
                        <span>Loading parts count...</span>
                    </div>
                    
                    <button id="mobile-filter-btn" class="btn-accent" style="display: none; padding: 8px 14px; font-size: 12px; font-weight: 700; align-items: center; justify-content: center; border-radius: var(--radius-sm); border: none; white-space: nowrap;">
                        ⚙️ Filter Parts
                    </button>
                    
                    <!-- Sorting Dropdown -->
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <label for="shop-sort" style="font-size: 13px; color: var(--text-muted); font-weight: 500;">Sort:</label>
                        <select id="shop-sort" class="form-control" style="width: 130px; padding: 8px 14px; background: rgba(0,0,0,0.2); font-size: 13px; border-radius: var(--radius-sm); margin-bottom: 0;">
                            <option value="/shop.html">Default</option>
                            <option value="/shop.html?sort=price_asc">Price: Low-High</option>
                            <option value="/shop.html?sort=price_desc">Price: High-Low</option>
                            <option value="/shop.html?sort=newest">Newest</option>
                        </select>
                    </div>
                </div>

                <!-- Product Grid (Injected via main.js) -->
                <div class="product-grid" id="shop-products-grid">
                    <div style="text-align: center; grid-column: span 3; color: var(--text-muted); padding: 80px 0;">Loading spare parts catalog...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="mobile-drawer-overlay" id="filter-drawer-overlay" style="z-index: 2090;"></div>

    <div id="footer-placeholder"></div>

    <script src="/js/main.js"></script>
</body>
</html>
